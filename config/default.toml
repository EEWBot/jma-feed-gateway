# jma-relay デフォルト設定。
# 全ての値は環境変数 `JMA_RELAY__<SECTION>__<KEY>`(区切りは `__`)で上書き可能。
# 例: JMA_RELAY__HTTP__BIND_ADDR=0.0.0.0:9000
# 秘密情報(dmdata.api_key)は環境変数 JMA_RELAY__DMDATA__API_KEY で設定すること。

[http]
bind_addr = "127.0.0.1:8080"
# 生成するAtomフィードの entry id / link に使う自サーバの公開URL
public_base_url = "http://127.0.0.1:8080"

[jma]
feed_url = "https://www.data.jma.go.jp/developer/xml/feed/eqvol.xml"
long_feed_url = "https://www.data.jma.go.jp/developer/xml/feed/eqvol_l.xml"
# ウォームアップ時に採用する電文種別コード。空リストで全通過。
telegram_types = [
    "VXSE51", "VXSE52", "VXSE53", "VXSE56", "VXSE60", "VXSE61", "VXSE62",
    "VYSE50", "VYSE51", "VYSE52", "VYSE60",
    "VTSE41", "VTSE51", "VTSE52",
    "VZSE40",
]
data_base_url = "https://www.data.jma.go.jp/developer/xml/data"
fetch_timeout_secs = 30
retry_attempts = 5
retry_initial_backoff_ms = 1000

[dmdata]
api_base = "https://api.dmdata.jp/v2"
# WebSocketエンドポイント。契約で複数本張れる場合のみ tokyo/osaka の2本を列挙する。
ws_endpoints = ["wss://ws.api.dmdata.jp/v2/websocket"]
# 2本張れる契約の例:
# ws_endpoints = [
#     "wss://ws-tokyo.api.dmdata.jp/v2/websocket",
#     "wss://ws-osaka.api.dmdata.jp/v2/websocket",
# ]
classifications = ["telegram.earthquake"]
# DMDATAサーバー側の電文type絞り込み(これはDMDATAサーバー側フィルター)。
# `types = []` にすると従来どおり全typeを受信する。
types = [
    "VXSE51", "VXSE52", "VXSE53", "VXSE56", "VXSE60", "VXSE61", "VXSE62",
    "VYSE50", "VYSE51", "VYSE52", "VYSE60",
    "VTSE41", "VTSE51", "VTSE52",
    "VZSE40",
]
app_name = "jma-relay"
cleanup_stale_sockets = true

[dmdata.reconnect]
initial_secs = 1
max_secs = 60
multiplier = 2.0

[poll]
# 全WS切断中のフォールバックpolling(JMA短期フィードのconditional GET)
enabled = true
# 毎分この秒にpollする(壁時計基準、0〜59)
offset_secs = 20
# 1 tickで実体取得する最大entry数(バースト保護)
entry_fetch_limit = 20
# ReportDateTime逆順の訂正報を取りこぼさないための遡り猶予(秒)
watermark_slack_secs = 600

[cache]
# Atomフィードに保持する最大entry数
feed_entries = 100
# 実体XMLキャッシュの最大件数
entity_capacity = 1024
# 実体XMLキャッシュのTTL(秒)。feedから外れて降格したDMDATA由来entryの
# 配信継続の猶予期間(feed在中はpinnedで保持されるためTTLの影響を受けない)
entity_ttl_secs = 86400
# dedup(seen)キャッシュのTTL(秒)
seen_ttl_secs = 3600
