# jma-feed-gateway デフォルト設定。
# 全ての値は環境変数 `JMA_FEED_GATEWAY__<SECTION>__<KEY>`(区切りは `__`)で上書き可能。
# 例: JMA_FEED_GATEWAY__HTTP__BIND_ADDR=0.0.0.0:9000
# 秘密情報(dmdata.api_key)は環境変数 JMA_FEED_GATEWAY__DMDATA__API_KEY で設定すること。

[http]
bind_addr = "127.0.0.1:8080"
# 生成するAtomフィードの entry id / link に使う自サーバの公開URL
public_base_url = "http://127.0.0.1:8080"

[dmdata]
api_base = "https://api.dmdata.jp/v2"
# telegram.data v1 のベースURL(api_baseとホストが異なる)
data_api_base = "https://data.api.dmdata.jp/v1"
# dmdata へのHTTPリクエストのタイムアウト(秒)
fetch_timeout_secs = 30
# telegram.list 取得のリトライ回数
retry_attempts = 5
# リトライの初期バックオフ(ミリ秒)。以降は倍々
retry_initial_backoff_ms = 1000
# WebSocketエンドポイント。契約で複数本張れる場合のみ tokyo/osaka の2本を列挙する。
ws_endpoints = ["wss://ws.api.dmdata.jp/v2/websocket"]
# 2本張れる契約の例:
# ws_endpoints = [
#     "wss://ws-tokyo.api.dmdata.jp/v2/websocket",
#     "wss://ws-osaka.api.dmdata.jp/v2/websocket",
# ]
classifications = ["telegram.earthquake"]
# 電文type絞り込み。WSではDMDATAサーバー側フィルター、warmup / fallback polling
# (telegram.list)ではクライアント側フィルターとして適用する。
# `types = []` にすると全typeを通す。
types = [
    "VXSE51", "VXSE52", "VXSE53", "VXSE56", "VXSE60", "VXSE61", "VXSE62",
    "VYSE50", "VYSE51", "VYSE52", "VYSE60",
    "VTSE41", "VTSE51", "VTSE52",
    "VZSE40",
]
app_name = "jma-feed-gateway"
cleanup_stale_sockets = true

[dmdata.reconnect]
initial_secs = 1
max_secs = 60
multiplier = 2.0

[poll]
# 全WS切断中のフォールバックpolling(dmdata telegram.list を毎分1ページ取得)
enabled = true
# 毎分この秒にpollする(壁時計基準、0〜59)
offset_secs = 20
# 1 tickで実体取得する最大entry数(バースト保護)
entry_fetch_limit = 20

[rate_limit]
# 外部リクエスト起因の dmdata telegram.data 呼び出し上限(スライディングウィンドウ)
max_requests = 40
window_secs = 300

[cache]
# Atomフィードに保持する最大entry数
feed_entries = 100
# 実体XMLキャッシュの最大件数
entity_capacity = 1024
# 実体XMLキャッシュのTTL(秒)。feedから外れて降格したDMDATA由来entryの
# 配信継続の猶予期間(feed在中はpinnedで保持されるためTTLの影響を受けない)
entity_ttl_secs = 86400
# dedup(seen)キャッシュのTTL(秒)
seen_ttl_secs = 3600
